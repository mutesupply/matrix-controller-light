workflows:
  ios-release:
    name: iOS Build (No Sign)

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build iOS
        script: flutter build ios --no-codesign

      - name: Create IPA
        script: |
          mkdir -p build_output/Payload
          cp -r build/ios/iphoneos/Runner.app build_output/Payload/
          cd build_output
          zip -r app.ipa Payload

    artifacts:
      - build_output/app.ipa
