workflows:
  ios-release:
    name: iOS Release Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
      - mkdir -p output
      - find build/ios/iphoneos -name "*.app" -exec cp -r {} output/ \;
      - cd output
      - zip -r app.zip .
    artifacts:
      - output/app.zip
