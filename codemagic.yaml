workflows:
  ios-release:
    name: iOS Release Build
    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
      - mkdir -p build_output
      - cp -r build/ios/iphoneos/Runner.app build_output/
      - cd build_output
      - zip -r app.zip Runner.app

    artifacts:
      - build_output/app.zip
