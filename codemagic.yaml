workflows:
  ios-release:
    name: iOS Release Build

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign

      - ls build/ios/iphoneos/

      - mkdir -p build_output
      - cp -r build/ios/iphoneos/*.app build_output/

      - ls build_output

      - cd build_output
      - zip -r app.zip .

    artifacts:
      - build_output/app.zip
