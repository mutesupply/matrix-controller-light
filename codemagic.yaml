workflows:
  ios-release:
    name: iOS Build No Sign

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Prepare iOS
        script: |
          flutter clean
          flutter pub get

      - name: Build iOS without signing
        script: |
          flutter build ios --no-codesign
          ls build/ios/iphoneos/

      - name: Create IPA
        script: |
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "❌ Runner.app NOT FOUND"
            exit 1
          fi

          mkdir -p build_output/Payload
          cp -r build/ios/iphoneos/Runner.app build_output/Payload/

          cd build_output
          zip -r app.ipa Payload

    artifacts:
      - build_output/app.ipa