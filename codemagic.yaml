workflows:
  ios-release:
    name: iOS Build (No Sign)

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign

      - mkdir -p build_output
      - cp -r build/ios/iphoneos/*.app build_output/
      - zip -r build_output/app.zip build_output

    artifacts:
      - build_output/app.zip
