workflows:
  ios-release:
    name: iOS Release Build
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
      - cd build/ios/iphoneos
      - zip -r Runner.app.zip Runner.app
    artifacts:
      - build/ios/iphoneos/Runner.app.zip
