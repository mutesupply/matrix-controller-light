name: matrix_control
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  http: ^1.2.1
  cupertino_icons: ^1.0.8
  sleek_circular_slider: ^2.0.1
